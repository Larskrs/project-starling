services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     starling
      POSTGRES_PASSWORD: starling
      POSTGRES_DB:       starling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starling -d starling"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
